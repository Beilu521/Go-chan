services:
  postgres:
    image: postgres:16-alpine
    container_name: gochan_postgres
    environment:
      POSTGRES_USER: beilu
      POSTGRES_PASSWORD: gochanbeilu@dev
      POSTGRES_DB: gochan
      POSTGRES_HOST_AUTH_METHOD: trust  # 开发环境使用免密，生产环境需更换
    ports:
      - 5432:5432
    volumes:
      - gochan_pg_data:/var/lib/postgresql/data

  redis:
      image: redis:7-alpine
      container_name: gochan_redis
      ports:
        - 6379:6379
      volumes:
        - gochan_redis_data:/data/

volumes:
  gochan_pg_data:
    driver: local
  gochan_redis_data:
    driver: local
